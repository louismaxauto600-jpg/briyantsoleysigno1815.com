<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSS Admin Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #000000, #ff8c00);
      color: white;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,140,0,0.35);
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      text-align: center;
    }
    .logo {
      width: 88px;
      height: 88px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #ff8c00;
      margin-bottom: 14px;
      background: #111;
    }
    h1 {
      margin: 0 0 8px;
      color: #ffb347;
      font-size: 1.9rem;
    }
    p {
      margin: 0 0 20px;
      color: #ddd;
      font-size: 0.95rem;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      margin: 9px 0;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 13px 14px;
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      background: #ff8c00;
      color: black;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #ffb347;
    }
    .secondary-btn {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .secondary-btn:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    .message {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.95rem;
      color: #ffd28a;
    }
    .small {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="bss-1815.png" alt="BSS Logo" class="logo" />
    <h1>BSS Admin Login</h1>
    <p>Secure access for authorized admins only.</p>

    <input type="email" id="email" placeholder="Admin email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="loginBtn">Login</button>
    <button id="resetBtn" class="secondary-btn" type="button">Reset Password</button>

    <div class="message" id="message"></div>
    <div class="small">Powered by Firebase Authentication</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY",
      authDomain: "PASTE_YOUR_AUTH_DOMAIN",
      projectId: "PASTE_YOUR_PROJECT_ID",
      storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
      messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
      appId: "PASTE_YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const resetBtn = document.getElementById("resetBtn");
    const message = document.getElementById("message");

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.style.color = isError ? "#ff9c9c" : "#ffd28a";
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });

    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage("Please enter email and password.", true);
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = "Signing in...";
        await signInWithEmailAndPassword(auth, email, password);
        showMessage("Login successful. Redirecting...");
        window.location.href = "dashboard.html";
      } catch (error) {
        console.error(error);
        showMessage("Login failed. Check your email or password.", true);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });

    resetBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();

      if (!email) {
        showMessage("Enter your email first to reset password.", true);
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        showMessage("Password reset email sent.");
      } catch (error) {
        console.error(error);
        showMessage("Could not send reset email.", true);
      }
    });
  </script>
</body>
</html>
